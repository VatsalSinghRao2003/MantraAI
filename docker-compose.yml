version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mantra-db
    environment:
      POSTGRES_DB: mantra
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mantra"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/mantra-api
      dockerfile: Dockerfile
    container_name: mantra-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=mantra
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/mantra-api/data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mantra-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
